
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IHC Smart Maintenance</title>

<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="IHC Maint">
<link rel="apple-touch-icon" href="icon.png">

<style>
body{
 background:#18181b;
 color:white;
 font-family:Arial;
 padding:20px;
 margin: 0;
}
input, select, button, textarea{
 width:100%;
 margin:6px 0;
 padding:10px;
 border-radius:8px;
 border:none;
 box-sizing: border-box; 
}
textarea { resize: vertical; font-family: Arial; }
button{
 background:#2563eb;
 color:white;
 font-weight:bold;
 cursor: pointer;
}
.card{
 background:#27272a;
 padding:15px;
 border-radius:12px;
 margin-top:15px;
}
/* Estilos para los botones tipo Pestaña */
.tabs {
 display: flex;
 gap: 10px;
 margin-top: 10px;
}
.tab-btn {
 background: #3f3f46;
 color: #a1a1aa;
}
.tab-btn.active {
 background: #2563eb;
 color: white;
}
/* Estilo para las tarjetas del historial */
.history-item {
 background: #3f3f46;
 padding: 12px;
 border-radius: 8px;
 margin-bottom: 10px;
 font-size: 14px;
}
.history-date { color: #a1a1aa; font-size: 12px; margin-bottom: 5px; }
.history-title { font-size: 16px; font-weight: bold; color: #60a5fa; }
</style>
</head>

<body>

<h2>IHC Smart Maintenance</h2>

<div class="tabs">
  <button id="btnAdd" class="tab-btn active" onclick="switchTab('add')">Add Machine</button>
  <button id="btnHistory" class="tab-btn" onclick="switchTab('history')">History</button>
</div>

<div id="viewAdd" class="card">
  <h3>New Record</h3>

  <input id="name" placeholder="Machine Name">

 <select id="type">
    <option>Lathe</option>
    <option>Mill</option>
    <option>Press Brake</option>
    <option>Laser Machine</option>
    <option>Other</option> 
 </select>

  <input id="brand" placeholder="Brand">
  <input id="model" placeholder="Model">
  <input id="year" placeholder="Year">
  <input id="hours" placeholder="Spindle Hours">
  
  <textarea id="notes" placeholder="Notes / Observaciones" rows="3"></textarea>

  <button onclick="saveMachine()">Save Machine</button>
</div>

<div id="viewHistory" class="card" style="display: none;">
  <h3>Maintenance History</h3>
  <button onclick="loadHistory()" style="background: #10b981; margin-bottom: 15px;">Refresh History</button>
  <div id="historyList">
    <p style="color: #a1a1aa; text-align: center;">Presiona Refresh para cargar...</p>
  </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzz2E61mwqDyIUhxdp3-WFkD6XUFQg55GOt3Lc3vvKgjiB4fg_ZTqTSj6-RR-FEbDgE/exec"; // <-- PEGA TU URL AQUÍ (SOLO UNA VEZ ES NECESARIO AHORA)

// Función para cambiar de pestañas
function switchTab(tab) {
  if(tab === 'add') {
    document.getElementById("viewAdd").style.display = "block";
    document.getElementById("viewHistory").style.display = "none";
    document.getElementById("btnAdd").classList.add("active");
    document.getElementById("btnHistory").classList.remove("active");
  } else {
    document.getElementById("viewAdd").style.display = "none";
    document.getElementById("viewHistory").style.display = "block";
    document.getElementById("btnAdd").classList.remove("active");
    document.getElementById("btnHistory").classList.add("active");
    loadHistory(); // Carga los datos automáticamente al abrir la pestaña
  }
}

// Función para guardar (POST)
async function saveMachine(){
 const machine={
  name:document.getElementById("name").value,
  type:document.getElementById("type").value,
  brand:document.getElementById("brand").value,
  model:document.getElementById("model").value,
  year:document.getElementById("year").value,
  hours:document.getElementById("hours").value,
  notes:document.getElementById("notes").value
 };

 document.querySelector("#viewAdd button").innerText = "Saving...";

 await fetch(SCRIPT_URL,{
   method:"POST",
   mode: "no-cors", 
   headers:{ "Content-Type":"text/plain;charset=utf-8" },
   body:JSON.stringify(machine)
 });

 alert("Machine saved!");
 
 // Limpiar formulario
 document.querySelectorAll("input, textarea").forEach(input => input.value = "");
 document.querySelector("#viewAdd button").innerText = "Save Machine";
}

// Función para leer el historial (GET)
async function loadHistory() {
  const container = document.getElementById("historyList");
  container.innerHTML = "<p style='text-align:center;'>Cargando datos desde Excel...</p>";

  try {
    // Para LEER datos, NO usamos "no-cors", hacemos un fetch normal
    const response = await fetch(SCRIPT_URL);
    const data = await response.json();

    let html = "";
    
    // El bucle va en reversa (del último al primero) para ver los más nuevos arriba.
    // i > 0 evita que se muestre la fila 1 de Excel (los encabezados).
    for(let i = data.length - 1; i > 0; i--) {
      let row = data[i];
      // row[0] es la fecha, row[1] el nombre, etc.
      let fecha = new Date(row[0]).toLocaleDateString();
      
      html += `
      <div class="history-item">
        <div class="history-date">${fecha}</div>
        <div class="history-title">${row[1]} (${row[2]})</div>
        <div>${row[3]} ${row[4]} - ${row[5]}</div>
        <div>Spindle: ${row[6]} hrs</div>
        <div style="margin-top:5px; font-style:italic; color:#a1a1aa;">Notas: ${row[7] || 'Ninguna'}</div>
      </div>`;
    }

    if (html === "") {
      container.innerHTML = "<p>No hay registros todavía.</p>";
    } else {
      container.innerHTML = html;
    }

  } catch (error) {
    container.innerHTML = "<p style='color:#ef4444;'>Error de conexión. Intenta de nuevo.</p>";
    console.error(error);
  }
}
</script>

</body>
</html>
